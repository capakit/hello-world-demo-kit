version: '1'
name: hello-world
license: Apache-2.0
workloads:
  hello:
    endpoints:
    - mcp
    runtime:
      source:
        toolchain: bun
        prepare:
          command: bun install
        start:
          command: bun run src/index.ts
expose:
- path: /mcp
  target: hello
  default_mcp: true
  endpoints:
  - mcp
