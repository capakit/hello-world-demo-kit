tests:
  - id: says-hello
    test: hello world tool returns structured text
    exposed_path: /mcp
    tool: hello-world
    inputs: {}
    verboseOutput:
      - $.text
    validations:
      - $.text.eq("hello world")
  - id: hello-typecheck
    kind: exec
    test: hello workload typechecks
    target:
      workload: hello
    command:
      - bun
      - x
      - tsc
      - --noEmit
    validations:
      - $.exit_code.eq(0)
