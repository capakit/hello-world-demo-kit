tests:
  - id: hello-world-tool-returns-structured-text
    kind: mcp
    target:
      exposed_path: /mcp
    request:
      tool: hello-world
      inputs: {}
    verbose_output:
      - $.text
    validations:
      - $.text.eq("hello world")
  - id: hello-workload-typechecks
    kind: exec
    target:
      workload: hello
    request:
      command:
        - bun
        - x
        - tsc
        - --noEmit
    validations:
      - $.exit_code.eq(0)
